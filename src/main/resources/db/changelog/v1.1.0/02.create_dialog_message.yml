databaseChangeLog:
  - changeSet:
      id: "02.create_dialog_message.yml"
      author: "Panyukov NN"
      changes:
        - createTable:
            tableName: dialog_message
            remarks: "Сообщение в рамках диалоговой сессии"
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: session_id
                  type: uuid
                  remarks: "Идентификатор сессии"
              - column:
                  name: role
                  type: varchar
                  remarks: "Роль отправителя"
              - column:
                  name: content
                  type: text
                  remarks: "Содержимое сообщения"

              - column:
                  name: create_time
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP AT TIME ZONE 'UTC'
                  constraints:
                    nullable: false
                  remarks: "Время создания"
              - column:
                  name: create_user
                  type: varchar
                  constraints:
                    nullable: false
                  remarks: "Пользователь, создавший запись"
              - column:
                  name: last_update_time
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP AT TIME ZONE 'UTC'
                  constraints:
                    nullable: false
                  remarks: "Время обновления"
              - column:
                  name: last_update_user
                  type: varchar
                  constraints:
                    nullable: false
                  remarks: "Пользователь, изменивший запись"
