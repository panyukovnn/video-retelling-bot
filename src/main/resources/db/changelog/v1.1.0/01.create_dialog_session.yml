databaseChangeLog:
  - changeSet:
      id: "01.create_dialog_session.yml"
      author: "Panyukov NN"
      changes:
        - createTable:
            tableName: dialog_session
            remarks: "Сессия диалога пользователя с ботом"
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: client_id
                  type: uuid
                  remarks: "Идентификатор клиента"
              - column:
                  name: video_url
                  type: varchar
                  remarks: "URL видео для пересказа"
              - column:
                  name: status
                  type: varchar
                  remarks: "Статус сессии"
              - column:
                  name: closed_at
                  type: timestamp
                  remarks: "Время закрытия сессии"

              - column:
                  name: create_time
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP AT TIME ZONE 'UTC'
                  constraints:
                    nullable: false
                  remarks: "Время создания"
              - column:
                  name: create_user
                  type: varchar
                  constraints:
                    nullable: false
                  remarks: "Пользователь, создавший запись"
              - column:
                  name: last_update_time
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP AT TIME ZONE 'UTC'
                  constraints:
                    nullable: false
                  remarks: "Время обновления"
              - column:
                  name: last_update_user
                  type: varchar
                  constraints:
                    nullable: false
                  remarks: "Пользователь, изменивший запись"
