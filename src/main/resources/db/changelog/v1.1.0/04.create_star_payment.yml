databaseChangeLog:
  - changeSet:
      id: "04.create_star_payment.yml"
      author: "Panyukov NN"
      changes:
        - createTable:
            tableName: star_payment
            remarks: "Запись об оплате пересказа через Telegram Stars"
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: client_id
                  type: uuid
                  remarks: "Идентификатор клиента"
              - column:
                  name: telegram_charge_id
                  type: varchar
                  remarks: "Уникальный идентификатор транзакции от Telegram"
              - column:
                  name: video_url
                  type: varchar
                  remarks: "URL видео, за пересказ которого произведена оплата"

              - column:
                  name: create_time
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP AT TIME ZONE 'UTC'
                  constraints:
                    nullable: false
                  remarks: "Время создания"
              - column:
                  name: create_user
                  type: varchar
                  constraints:
                    nullable: false
                  remarks: "Пользователь, создавший запись"
              - column:
                  name: last_update_time
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP AT TIME ZONE 'UTC'
                  constraints:
                    nullable: false
                  remarks: "Время обновления"
              - column:
                  name: last_update_user
                  type: varchar
                  constraints:
                    nullable: false
                  remarks: "Пользователь, изменивший запись"
