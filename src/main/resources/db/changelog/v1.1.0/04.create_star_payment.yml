databaseChangeLog:
  - changeSet:
      id: "04.create_star_payment.yml"
      author: "Panyukov NN"
      changes:
        - createTable:
            tableName: star_payment
            remarks: "Запись об оплате пересказа через Telegram Stars"
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: client_id
                  type: uuid
                  remarks: "Идентификатор клиента"
                  constraints:
                    nullable: false
                    foreignKeyName: fkey_star_payment_client_id
                    references: clients(id)
              - column:
                  name: telegram_charge_id
                  type: varchar
                  remarks: "Уникальный идентификатор транзакции от Telegram"
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: key_star_payment_telegram_charge_id
              - column:
                  name: video_url
                  type: varchar
                  remarks: "URL видео, за пересказ которого произведена оплата"
              - column:
                  name: create_time
                  type: timestamp
                  remarks: "Время создания"
              - column:
                  name: create_user
                  type: varchar
                  remarks: "Пользователь, который создал запись"
              - column:
                  name: last_update_time
                  type: timestamp
                  remarks: "Время последнего изменения"
              - column:
                  name: last_update_user
                  type: varchar
                  remarks: "Пользователь, который последним внес изменения"
