databaseChangeLog:
  - changeSet:
      id: "14.update_contents.yml"
      author: "Panyukov NN"
      changes:
        - dropColumn:
            tableName: contents
            columnName: batch_id
        - addColumn:
            tableName: contents
            columns:
              - column:
                  name: parent_batch_id
                  type: uuid
                  remarks: "Идентификатор группы родительского контента, из которого выполняется преобразование"
              - column:
                  name: child_batch_id
                  type: uuid
                  remarks: "Идентификатор группы дочернего контента, в который выполнено преобразование"
